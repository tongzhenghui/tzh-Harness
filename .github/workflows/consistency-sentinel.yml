# ============================================================================
# Consistency Sentinel — MIRA P-2 一致性原则 CI 门禁
# Phase 1: Caller template → huanlongAI/sentinel-shared reusable workflow
# NOTE: permissions MUST be in caller, not in reusable workflow
# ============================================================================
name: Consistency Sentinel

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_llm:
        description: '跳过 LLM 审查层'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  sentinel:
    uses: huanlongAI/sentinel-shared/.github/workflows/consistency-sentinel.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    with:
      skip_llm: ${{ github.event.inputs.skip_llm || 'false' }}
